<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GGSIPU - Examination Division Login</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
background:#f1f3f8;
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
padding:16px;
}

.card{
width:100%;
max-width:420px;
border-radius:16px;
overflow:hidden;
background:#fff;
box-shadow:0 8px 30px rgba(0,0,0,0.12);
}

.header{
background:linear-gradient(to bottom,#7b82d6,#8b6abf);
padding:32px 24px;
text-align:center;
color:#fff;
}

.logo-box{
display:inline-block;
background:rgba(255,255,255,0.9);
border-radius:8px;
padding:10px 20px;
margin-bottom:16px;
}

.logo-box span{
color:#8b1a1a;
font-weight:700;
font-size:13px;
letter-spacing:1px;
}

.logo-box .uni{
font-size:17px;
font-weight:800;
}

.logo-box .ipu{
color:#7b82d6;
font-size:17px;
font-weight:800;
}

.logo-box .sub{
font-size:10px;
letter-spacing:3px;
font-weight:600;
}

.header h1{
font-size:20px;
font-weight:700;
}

.header p{
font-size:13px;
opacity:0.85;
margin-top:4px;
}

.header .badge{
display:inline-block;
margin-top:10px;
border:1px solid rgba(255,255,255,0.4);
border-radius:6px;
padding:4px 16px;
font-size:13px;
font-weight:600;
}

.form-area{
padding:32px;
}

.form-group{
margin-bottom:20px;
}

label{
display:block;
font-size:13px;
font-weight:600;
color:#222;
margin-bottom:6px;
}

input[type="text"],
input[type="password"]{
width:100%;
padding:10px 14px;
border:1px solid #dde1e8;
border-radius:8px;
font-size:14px;
color:#333;
background:#fff;
outline:none;
}

input:focus{
border-color:#7b82d6;
box-shadow:0 0 0 2px rgba(123,130,214,0.2);
}

input::placeholder{
color:#aaa;
}

.captcha-box{
border:1px solid #dde1e8;
border-radius:8px;
padding:14px;
margin-bottom:20px;
}

.captcha-label{
font-size:11px;
font-weight:600;
letter-spacing:2px;
color:#888;
text-transform:uppercase;
margin-bottom:8px;
}

.captcha-row{
display:flex;
align-items:center;
gap:10px;
margin-bottom:10px;
}

.captcha-text{
font-family:monospace;
font-size:20px;
font-weight:700;
font-style:italic;
letter-spacing:4px;
color:#333;
text-decoration:line-through;
border:1px solid #dde1e8;
border-radius:4px;
padding:6px 16px;
background:#f5f6fa;
}

.refresh-btn{
width:36px;
height:36px;
border:1px solid #dde1e8;
border-radius:8px;
background:#fff;
font-size:18px;
color:#888;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
}

.refresh-btn:hover{
background:#f5f6fa;
}

.login-btn{
width:100%;
padding:12px;
background:#7b82d6;
color:#fff;
border:none;
border-radius:8px;
font-size:14px;
font-weight:700;
letter-spacing:2px;
text-transform:uppercase;
cursor:pointer;
}

.login-btn:hover{
opacity:0.9;
}

.forgot{
text-align:center;
margin-top:16px;
}

.forgot a{
color:#888;
font-size:13px;
text-decoration:none;
}

.forgot a:hover{
color:#7b82d6;
}

/* VIDEO REVEAL */

#reveal{
display:none;
position:fixed;
inset:0;
background:black;
align-items:center;
justify-content:center;
z-index:999;
}

#reveal video{
max-width:95%;
max-height:95vh;
}

</style>
</head>


<body>

<div class="card">

<div class="header">

<div class="logo-box">
<span>GURU GOBIND SINGH<br>
<span class="uni">INDRAPRASTHA</span>
<span class="ipu">IPU</span><br>
<span class="sub">UNIVERSITY · NEW DELHI</span>
</span>
</div>

<h1>Guru Gobind Singh Indraprastha University</h1>
<p>Dwarka Sector 16-C, New Delhi</p>

<span class="badge">Examination Division</span>

</div>


<div class="form-area">

<form id="loginForm">

<div class="form-group">
<label>User Name</label>
<input type="text" placeholder="Enter your username">
</div>

<div class="form-group">
<label>Password</label>
<input type="password" placeholder="Enter your password">
</div>

<div class="captcha-box">

<div class="captcha-label">Security Check</div>

<div class="captcha-row">
<span class="captcha-text">Ab3XkZ</span>
<button type="button" class="refresh-btn">&#x21bb;</button>
</div>

<input type="text" placeholder="Enter code shown above">

</div>

<button type="submit" class="login-btn">Secure Login</button>

<div class="forgot">
<a href="#">Forgot Password?</a>
</div>

</form>

</div>

</div>


<div id="reveal">

<video autoplay playsinline controls>
<source src="memory.mp4" type="video/mp4">
</video>

</div>


<script>

const form = document.getElementById("loginForm");

form.addEventListener("submit",function(e){

e.preventDefault();

document.querySelector(".card").style.display="none";

document.getElementById("reveal").style.display="flex";

});

</script>

</body>
</html>
